apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-stateful
  namespace: db-ns
spec:
  selector:
    matchLabels:
      app: redis # has to match .spec.template.metadata.labels
  serviceName: "redis-service"
  replicas: 1 # by default is 1
  template:
    metadata:
      labels:
        app: redis # has to match .spec.selector.matchLabels
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: redis-storage
              mountPath: /data

    volumeClaimTemplates:
        - metadata:
            name: redis-storage
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: redis-storage-class
            resources:
              requests:
                storage: 50Mi  
