apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-pv
spec:
  capacity:
    storage: 5Gi

  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Recycle

  nfs:
    path: /eks/data
    server: 192.168.16.214

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: db-ns
  labels:
    app: redis-pvc
spec:
  storageClassName: nfs-client
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
