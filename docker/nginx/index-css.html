<!doctype html>
<html>
  <head>
    <title>K8s Assignment App</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #ff512f, #dd2476); /* red → pink */
    color: #fff8f6;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    text-align: center;
    background: rgba(255, 255, 255, 0.12);
    padding: 45px;
    border-radius: 18px;
    backdrop-filter: blur(14px);
    box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
    border: 1px solid rgba(255, 255, 255, 0.2);
  }

  h1 {
    margin-bottom: 10px;
    font-size: 2.6rem;
    font-weight: 600;
    color: #ffffff;
  }

  p {
    font-size: 1.15rem;
    margin-bottom: 25px;
    color: #ffe4e1; /* soft warm white */
  }

  button {
    background: linear-gradient(45deg, #ffb347, #ffcc33); /* yellow/orange pop */
    border: none;
    padding: 12px 26px;
    font-size: 1rem;
    color: #5a1a00; /* darker text for contrast */
    border-radius: 30px;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: all 0.25s ease;
    box-shadow: 0 4px 15px rgba(255, 180, 71, 0.5);
  }

  button:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 25px rgba(255, 180, 71, 0.7);
  }

  #output {
    margin-top: 20px;
    font-size: 1.4rem;
    font-weight: bold;
    color: #fff176; /* bright yellow highlight */
  }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Welcome to My App <i class="fa fa-rocket"></i></h1>
      <p>This is served by Nginx</p>

      <button onclick="getData()">Call Backend API</button>

      <p id="output"></p>
    </div>

    <script>
      function getData() {
        fetch("/api")
          .then((response) => response.json())
          .then((data) => {
            document.getElementById("output").innerText = "Hits: " + data.hits;
          });
      }
    </script>
  </body>
</html>
