<!doctype html>
<html>
  <head>
    <title>K8s Assignment App</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        text-align: center;
        background: rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 16px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
      }

      h1 {
        margin-bottom: 10px;
        font-size: 2.5rem;
      }

      p {
        font-size: 1.2rem;
        margin-bottom: 20px;
      }

      button {
        background: #ff7a18;
        background: linear-gradient(45deg, #ff7a18, #ffb347);
        border: none;
        padding: 12px 24px;
        font-size: 1rem;
        color: #fff;
        border-radius: 25px;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }

      #output {
        margin-top: 20px;
        font-size: 1.4rem;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Welcome to My App <i class="fa fa-rocket"></i></h1>
      <p>This is served by Nginx</p>

      <button onclick="getData()">Call Backend API</button>

      <p id="output"></p>
    </div>

    <script>
      function getData() {
        fetch("/api")
          .then((response) => response.json())
          .then((data) => {
            document.getElementById("output").innerText = "Hits: " + data.hits;
          });
      }
    </script>
  </body>
</html>
